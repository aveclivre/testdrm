<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명의 서재 - 사주 도서 큐레이션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif KR', serif; }
        .fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        .element-badge { @apply px-3 py-1 rounded-full text-[10px] font-bold tracking-tighter uppercase; }
    </style>
</head>
<body class="min-h-screen bg-[#0a0c1a] text-slate-200 selection:bg-amber-900 selection:text-amber-100 relative overflow-x-hidden">

    <!-- 배경 장식 -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-amber-900/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="max-w-4xl mx-auto px-6 py-12 relative z-10">
        <!-- 헤더 -->
        <header class="text-center mb-16 space-y-4">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-amber-500/30 bg-amber-500/5 text-amber-400 text-sm tracking-widest uppercase mb-4 animate-pulse">
                <i class="fas fa-moon"></i> Destiny's Archive
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500">
                운명의 책장을 넘기다
            </h1>
            <p class="text-slate-400 text-lg max-w-xl mx-auto font-light leading-relaxed">
                당신이 태어난 날의 별자리를 읽어, <br>생애의 궤적과 맞닿은 한 권의 문장을 선물합니다.
            </p>
        </header>

        <!-- 입력 섹션 -->
        <div class="glass-panel rounded-3xl p-8 shadow-2xl mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                <div class="space-y-3">
                    <label class="text-amber-200/70 text-sm tracking-wider flex items-center gap-2">
                        <i class="fas fa-calendar-alt"></i> 탄생의 기록 (생년월일)
                    </label>
                    <input type="date" id="birthDate" class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all outline-none text-white text-lg">
                </div>
                <div class="space-y-3">
                    <label class="text-amber-200/70 text-sm tracking-wider flex items-center gap-2">
                        <i class="fas fa-book-open"></i> 펼칠 서재의 종류
                    </label>
                    <div class="flex bg-black/40 p-1.5 rounded-2xl border border-white/5">
                        <button onclick="toggleBookType('picture')" id="btnPicture" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all bg-amber-500 text-black font-bold">
                            <i class="fas fa-child"></i> 동심의 서재
                        </button>
                        <button onclick="toggleBookType('adult')" id="btnAdult" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all text-slate-400">
                            <i class="fas fa-book"></i> 사색의 서재
                        </button>
                    </div>
                </div>
            </div>

            <button onclick="handleAnalyze()" id="btnAnalyze" class="w-full mt-10 py-5 bg-gradient-to-r from-amber-600 to-amber-400 hover:from-amber-500 hover:to-amber-300 text-black font-black text-xl rounded-2xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-xl flex items-center justify-center gap-3">
                <i class="fas fa-sparkles"></i> <span id="btnText">기록된 운명의 문장을 읽다</span>
            </button>
            <p id="errorMsg" class="mt-4 text-center text-red-400 text-sm italic hidden"></p>
        </div>

        <!-- 결과 표시 영역 -->
        <div id="resultArea" class="hidden space-y-12 fade-in"></div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center space-y-6">
        <div class="relative">
            <div class="w-24 h-24 border-t-2 border-b-2 border-amber-500 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fas fa-sparkles text-amber-500 animate-pulse text-2xl"></i>
            </div>
        </div>
        <div class="text-center">
            <p class="text-2xl font-bold text-amber-200">별의 궤적을 쫓는 중...</p>
            <p class="text-slate-400 font-light italic">서고에서 당신의 책을 찾고 있습니다.</p>
        </div>
    </div>

    <script>
        const apiKey = ""; // Gemini API 키

        let currentBookType = 'picture';

        const KAN = ['갑', '을', '병', '정', '무', '기', '경', '신', '임', '계'];
        const JI = ['자', '축', '인', '묘', '진', '사', '오', '미', '신', '유', '술', '해'];

        const KAN_DATA = {
            '갑': { name: '갑목(甲木)', element: '목(木)', nature: '하늘을 향해 곧게 뻗은 고결한 거목', icon: 'fa-tree', color: 'text-green-400', bg: 'bg-green-500/20' },
            '을': { name: '을목(乙木)', element: '목(木)', nature: '바람에 흔들려도 꺾이지 않는 유연한 덩굴과 꽃', icon: 'fa-seedling', color: 'text-emerald-300', bg: 'bg-emerald-500/20' },
            '병': { name: '병화(丙火)', element: '화(火)', nature: '세상 만물을 비추는 찬란하고 열정적인 태양', icon: 'fa-sun', color: 'text-orange-400', bg: 'bg-orange-500/20' },
            '정': { element: '화(火)', nature: '어둠 속을 고요히 밝히는 따스하고 사색적인 등불', icon: 'fa-fire', color: 'text-red-400', bg: 'bg-red-500/20' },
            '무': { element: '토(土)', nature: '모든 생명을 품어안은 웅장하고 든든한 황금빛 대지', icon: 'fa-mountain', color: 'text-yellow-600', bg: 'bg-yellow-600/20' },
            '기': { element: '토(土)', nature: '생명을 길러내고 보듬는 포근하고 비옥한 논밭', icon: 'fa-clover', color: 'text-yellow-400', bg: 'bg-yellow-400/20' },
            '경': { element: '금(金)', nature: '정의롭고 강직하며 단단하게 제련된 바위와 칼', icon: 'fa-shish-kebab', color: 'text-slate-300', bg: 'bg-slate-500/20' },
            '신': { element: '금(金)', nature: '세심하게 가공되어 스스로 빛을 내는 고귀한 보석', icon: 'fa-gem', color: 'text-blue-200', bg: 'bg-blue-300/20' },
            '임': { element: '수(水)', nature: '모든 지혜를 품고 도도하게 흐르는 깊은 바다', icon: 'fa-water', color: 'text-blue-500', bg: 'bg-blue-500/20' },
            '계': { element: '수(水)', nature: '만물을 적시고 생기를 부여하는 맑고 영특한 단비', icon: 'fa-cloud-showers-heavy', color: 'text-cyan-400', bg: 'bg-cyan-500/20' }
        };

        const JI_DATA = {
            '자': { animal: '쥐', desc: '지혜로운 영감이 샘솟는 깊은 밤', icon: 'fa-mouse' },
            '축': { animal: '소', desc: '끈기 있게 씨앗을 품고 기다리는 새벽의 땅', icon: 'fa-cow' },
            '인': { animal: '호랑이', desc: '새로운 시작을 선포하며 포효하는 이른 아침', icon: 'fa-cat' },
            '묘': { animal: '토끼', desc: '만물에 생동감을 불어넣는 화창한 봄날의 기운', icon: 'fa-rabbit' },
            '진': { animal: '용', desc: '변화를 두려워 않고 하늘로 비상하는 구름의 기상', icon: 'fa-dragon' },
            '사': { animal: '뱀', desc: '명석한 두뇌와 예리한 통찰력을 지닌 정오의 불꽃', icon: 'fa-staff-snake' },
            '오': { animal: '말', desc: '앞을 향해 거침없이 질주하는 진취적인 에너지', icon: 'fa-horse' },
            '미': { animal: '양', desc: '뜨거운 열기를 품어 성숙을 이뤄내는 안식의 대지', icon: 'fa-sheep' },
            '신': { animal: '원숭이', desc: '재기발랄한 변화와 세밀한 재주를 지닌 가을의 시작', icon: 'fa-blind' },
            '유': { animal: '닭', desc: '순수하고 예리하며 결실을 증명하는 완성의 기운', icon: 'fa-dove' },
            '술': { animal: '개', desc: '자신의 자리를 묵묵히 지키는 충직하고 사려 깊은 마음', icon: 'fa-dog' },
            '해': { animal: '돼지', desc: '모든 것을 수용하고 정을 나누는 넉넉한 바다의 마음', icon: 'fa-piggy-bank' }
        };

        const ILJU_INTERPRETATION = {
            traits: (kan, ji) => {
                const k = KAN_DATA[kan];
                const j = JI_DATA[ji];
                return `${k.nature}와 ${j.desc}이 만났습니다. 이 기운은 겉으로는 ${k.element}의 특성을 띠며 강한 자아를 형성하고, 내면에는 ${j.animal}의 지혜와 영리함을 품고 있습니다.`;
            }
        };

        function toggleBookType(type) {
            currentBookType = type;
            const btnP = document.getElementById('btnPicture');
            const btnA = document.getElementById('btnAdult');
            if (type === 'picture') {
                btnP.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all bg-amber-500 text-black font-bold";
                btnA.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all text-slate-400";
            } else {
                btnA.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all bg-amber-500 text-black font-bold";
                btnP.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-xl transition-all text-slate-400";
            }
        }

        async function handleAnalyze() {
            const birthInput = document.getElementById('birthDate').value;
            if (!birthInput) return;

            const loader = document.getElementById('loadingOverlay');
            const resultArea = document.getElementById('resultArea');
            const errorMsg = document.getElementById('errorMsg');

            loader.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            resultArea.classList.add('hidden');

            try {
                const date = new Date(birthInput);
                const baseDate = new Date('1900-01-01');
                const diffDays = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
                const offset = (diffDays + 10) % 60;
                const kanIdx = offset % 10;
                const jiIdx = offset % 12;
                
                const kan = KAN[kanIdx];
                const ji = JI[jiIdx];
                
                const ilju = {
                    name: kan + ji,
                    kan: kan,
                    ji: ji,
                    kanData: KAN_DATA[kan],
                    jiData: JI_DATA[ji],
                    fullStory: ILJU_INTERPRETATION.traits(kan, ji)
                };

                const targetStr = currentBookType === 'picture' ? "어린이와 성인 모두에게 감동을 주는 예술적인 그림책" : "깊은 사색과 문학성을 지닌 인문학/문학 도서";
                const prompt = `사주 '${ilju.name}일주'(성향: ${ilju.fullStory})인 사람의 마음을 어루만지고 영감을 줄 수 있는 ${targetStr} 3권을 추천해줘.
                각 도서는 이 사람의 타고난 기운과 어떻게 연결되는지 '추천 사유'를 매우 감성적이고 구체적으로 작성해줘. 
                JSON 형식으로만 응답: { "books": [{ "title": "", "author": "", "reason": "", "description": "" }] }`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const books = JSON.parse(data.candidates[0].content.parts[0].text).books;

                renderResult(ilju, books);
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "서고의 문이 잠겨 있습니다. API 키 설정을 확인하거나 잠시 후 다시 시도해 주세요.";
                errorMsg.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderResult(ilju, books) {
            const resultArea = document.getElementById('resultArea');
            const bookTypeTitle = currentBookType === 'picture' ? '동심의 서재' : '사색의 서재';
            
            let booksHtml = books.map((b, i) => `
                <div class="flex flex-col bg-white/5 border border-white/10 rounded-3xl overflow-hidden hover:bg-white/10 transition-all group shadow-xl">
                    <div class="aspect-[3/4] relative bg-black flex items-center justify-center p-8 overflow-hidden">
                         <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                        <div class="z-10 text-center space-y-3 px-4">
                            <i class="fas fa-book-open text-amber-500/30 text-4xl group-hover:text-amber-500 transition-all group-hover:scale-110"></i>
                            <h5 class="text-amber-100 font-bold text-lg leading-tight">${b.title}</h5>
                        </div>
                    </div>
                    <div class="p-6 space-y-4 flex-1 flex flex-col">
                        <p class="text-[10px] text-amber-500 font-bold uppercase tracking-[0.2em]">${b.author}</p>
                        <div class="bg-amber-900/20 p-4 rounded-2xl border border-amber-500/10 text-[13px] text-amber-100/90 italic leading-relaxed">
                            <i class="fas fa-quote-left text-[10px] text-amber-500/50 mb-1 block"></i>
                            "${b.reason}"
                        </div>
                        <p class="text-slate-400 text-sm font-light leading-relaxed line-clamp-4">${b.description}</p>
                        <a href="https://search.kyobobook.co.kr/search?keyword=${encodeURIComponent(b.title)}" target="_blank" class="mt-auto w-full py-3 bg-white/5 hover:bg-amber-500 hover:text-black rounded-xl text-[11px] font-bold transition-all flex items-center justify-center gap-2">
                            서점 아카이브 방문 <i class="fas fa-external-link-alt text-[9px]"></i>
                        </a>
                    </div>
                </div>
            `).join('');

            resultArea.innerHTML = `
                <div class="glass-panel rounded-3xl p-8 md:p-12 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-8 opacity-5">
                        <i class="fas ${ilju.kanData.icon} text-9xl"></i>
                    </div>
                    <div class="flex flex-col md:flex-row items-center gap-12">
                        <div class="relative group">
                            <div class="w-40 h-40 rounded-full bg-gradient-to-br from-slate-900 to-black flex flex-col items-center justify-center border-2 border-amber-500/30 shadow-[0_0_40px_-10px_rgba(245,158,11,0.2)]">
                                <span class="text-6xl font-black text-amber-200">${ilju.name}</span>
                                <span class="text-[10px] font-bold tracking-[0.3em] text-amber-500/70 mt-1 uppercase">Ilju Analysis</span>
                            </div>
                            <div class="absolute -top-2 -right-2 w-12 h-12 rounded-full ${ilju.kanData.bg} border border-white/10 flex items-center justify-center ${ilju.kanData.color} shadow-xl backdrop-blur-md">
                                <i class="fas ${ilju.kanData.icon} text-xl"></i>
                            </div>
                        </div>
                        <div class="flex-1 text-center md:text-left space-y-6">
                            <div class="space-y-1">
                                <div class="flex flex-wrap items-center justify-center md:justify-start gap-2 mb-2">
                                    <span class="px-3 py-1 bg-amber-500/10 border border-amber-500/20 rounded-full text-[10px] font-bold text-amber-400 tracking-tighter">천간: ${ilju.kanData.element}</span>
                                    <span class="px-3 py-1 bg-indigo-500/10 border border-indigo-500/20 rounded-full text-[10px] font-bold text-indigo-400 tracking-tighter">지지: ${ilju.jiData.animal}</span>
                                </div>
                                <h2 class="text-3xl md:text-4xl font-bold">당신은 <span class="text-amber-400 font-black">"${ilju.name}일주"</span>의 기운을 가졌군요.</h2>
                            </div>
                            <div class="space-y-4">
                                <p class="text-lg text-slate-300 font-light leading-relaxed">
                                    <span class="${ilju.kanData.color} font-bold">${ilju.kanData.nature}</span>의 의지를 품고, <br class="hidden md:block">
                                    <span class="text-indigo-300 font-medium">${ilju.jiData.desc}</span>을 살아가는 존재입니다.
                                </p>
                                <p class="text-slate-400 text-sm font-light leading-relaxed max-w-2xl">
                                    ${ilju.fullStory}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <section class="space-y-8">
                    <div class="flex items-center gap-4">
                        <div class="h-px flex-1 bg-gradient-to-r from-transparent to-amber-500/30"></div>
                        <h3 class="text-xl font-bold text-center text-amber-200 tracking-widest uppercase">
                             당신을 위한 계시: ${bookTypeTitle}
                        </h3>
                        <div class="h-px flex-1 bg-gradient-to-l from-transparent to-amber-500/30"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">${booksHtml}</div>
                </section>

                <footer class="text-center pt-8 border-t border-white/5">
                    <p class="text-[11px] text-slate-500 italic font-light tracking-wide">
                        "별들이 당신에게 건네는 한 권의 책이 고단한 삶의 작은 쉼표가 되기를 소망합니다."
                    </p>
                </footer>
            `;
            resultArea.classList.remove('hidden');
        }
    </script>
</body>
</html>
